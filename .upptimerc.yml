owner: SmoothSend
repo: status

sites:
  - name: API Gateway
    url: https://proxy.smoothsend.xyz/health
  - name: Aptos Relayer (Mainnet)
    url: http://api.smoothsend.xyz:3000/ping
  - name: EVM Relayer (Testnet)
    url: https://smoothsendrelayerevm.onrender.com/api/v1/relayer/health
  - name: Stellar Relayer (Testnet)
    url: https://stellar-relayer.onrender.com/health

status-website:
  cname: status.smoothsend.xyz
  name: SmoothSend Status
  themeUrl: https://status.smoothsend.xyz/smoothsend-theme.css
  logoUrl: https://status.smoothsend.xyz/logo.png
  favicon: https://status.smoothsend.xyz/logo.png
  introTitle: "**SmoothSend** Status"
  introMessage: "Real-time status of SmoothSend core infrastructure and services. Uptime over the past 90 days."
  navbar:
    - title: Status
      href: /
    - title: Docs
      href: https://docs.smoothsend.xyz
    - title: Website
      href: https://smoothsend.xyz
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
  js: >
    (function(){
      var groups=[
        {before:'API Gateway',label:'Core Infrastructure',icon:'server'},
        {before:'Aptos Relayer',label:'Production Relayers',icon:'shield'},
        {before:'EVM Relayer',label:'Experimental Relayers (Testnet)',icon:'flask'}
      ];
      var icons={
        server:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><circle cx="6" cy="6" r="1"/><circle cx="6" cy="18" r="1"/></svg>',
        shield:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
        flask:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3h6M10 3v6.5L4 20h16L14 9.5V3"/></svg>'
      };
      function inject(){
        var section=document.querySelector('.live-status');
        if(!section)return setTimeout(inject,500);
        var cards=section.querySelectorAll(':scope > div, :scope > section, :scope > article');
        if(cards.length<4)return setTimeout(inject,500);
        if(section.querySelector('.ss-group'))return;
        groups.forEach(function(g){
          for(var i=0;i<cards.length;i++){
            var title=cards[i].textContent||'';
            if(title.indexOf(g.before)!==-1){
              var hdr=document.createElement('div');
              hdr.className='ss-group';
              hdr.innerHTML='<span class="ss-group-icon">'+icons[g.icon]+'</span> '+g.label;
              section.insertBefore(hdr,cards[i]);
              break;
            }
          }
        });
      }
      inject();
      new MutationObserver(function(){inject()}).observe(document.body,{childList:true,subtree:true});
    })();
  css: >
    .ss-group {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 0 6px 0;
      margin-top: 16px;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #A1A1AA;
      border-top: 1px solid #333;
      font-family: 'Inter', sans-serif;
    }
    .ss-group:first-child {
      margin-top: 0;
      border-top: none;
    }
    .ss-group-icon {
      display: flex;
      align-items: center;
      color: #0066FF;
    }
    .live-status section,
    .live-status > div:not(.ss-group):not(.loading) {
      border: 1px solid #333 !important;
      border-radius: 0 !important;
      background: #0A0A0A !important;
    }

notifications:
  - type: discord
    url: $DISCORD_WEBHOOK

user-agent: SmoothSend-StatusBot
assignees:
  - vedmohan
