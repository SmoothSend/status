name: Cache Issues
on:
  schedule:
    - cron: "*/10 * * * *"
  issues:
    types: [opened, closed, labeled, unlabeled]
  workflow_dispatch:
jobs:
  cache:
    name: Cache issues to JSON
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Fetch and save issues
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          gh api "repos/${{ github.repository }}/issues?state=all&per_page=100" --paginate --jq '[.[] | select(.pull_request == null)]' > history/issues.json
      - name: Commit if changed
        run: |
          git config user.name "smoothsendlabs"
          git config user.email "smoothsendlabs@users.noreply.github.com"
          git add history/issues.json
          git diff --staged --quiet || (git pull --rebase origin main && git commit -m "Update issues cache [skip ci]" && git push)
